<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>華和資產客服表單</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f6f9;
      font-family: Arial, "Noto Sans TC", sans-serif;
      color: #222;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #0f5132;
      font-size: 24px;
      margin: 0 0 12px;
    }

    .intro {
      text-align: center;
      color: #555;
      line-height: 1.8;
      font-size: 15px;
      margin-bottom: 18px;
    }

    .status {
      background: #f0fff4;
      color: #198754;
      border: 1px solid #cce5d8;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 22px;
      font-size: 14px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 22px;
    }

    .label {
      display: block;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .radio-box {
      display: block;
      border: 1px solid #ddd;
      background: #fafafa;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 15px;
    }

    input[type="text"],
    input[type="tel"],
    textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #06c755;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:active {
      opacity: 0.8;
    }

    .notice {
      margin-top: 24px;
      background: #fff8e1;
      border-left: 5px solid #f4c542;
      border-radius: 10px;
      padding: 16px;
      line-height: 1.9;
      font-size: 14px;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <h1>華和資產客服表單</h1>

      <div class="intro">
        您好！感謝您聯繫華和資產，請您填寫以下資訊，我們將由專人為您回覆。
      </div>

      <div id="status" class="status">
        LIFF 初始化中，請稍候...
      </div>

      <div class="field">
        <span class="label">1. 諮詢事由</span>

        <label class="radio-box">
          <input type="radio" name="reason" value="房屋保固期間報修申請" checked>
          房屋保固期間報修申請
        </label>

        <label class="radio-box">
          <input type="radio" name="reason" value="都更合建需求">
          都更合建需求
        </label>

        <label class="radio-box">
          <input type="radio" name="reason" value="其他">
          其他
        </label>
      </div>

      <div class="field">
        <label class="label">2. 姓名</label>
        <input id="name" type="text" placeholder="請輸入您的姓名">
      </div>

      <div class="field">
        <label class="label">3. 電話</label>
        <input id="phone" type="tel" placeholder="請輸入您的聯絡電話">
      </div>

      <div class="field">
        <label class="label">4. 需求簡述</label>
        <textarea id="request" placeholder="請簡單描述您的需求"></textarea>
      </div>

      <button class="btn" onclick="submitForm()">
        送出表單
      </button>

      <div class="notice">
        <strong>《提醒》</strong><br>
        若為房屋保固之修繕需求，請同步傳送報修處的照片或影片，以利工程人員初步判斷屋況。<br><br>

        🕒 <strong>【服務時間】</strong><br>
        週一至週五 08:00-17:00，若於非上班時間留言，我們將於次一工作日聯繫。<br><br>

        🚨 <strong>緊急狀況：</strong><br>
        若遇水電瓦斯等即時問題，請優先撥打物業管理室電話以策安全。
      </div>

      <div class="footer">
        華和資產｜誠信 服務 穩健 永續
      </div>

    </div>
  </div>

  <script>
    const LIFF_ID = "2010301982-W9csNsdj";

    async function main() {
      try {
        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          document.getElementById("status").innerHTML = "尚未登入 LINE，正在導向授權畫面...";
          liff.login();
          return;
        }

        document.getElementById("status").innerHTML = "✅ LINE 已登入，可以填寫表單";

      } catch (error) {
        document.getElementById("status").innerHTML =
          "❌ LIFF 初始化失敗：<br>" + error.message;
      }
    }

    async function submitForm() {
      alert("開始送出表單");

      try {
        if (!liff.isLoggedIn()) {
          alert("尚未登入 LINE，請重新開啟表單");
          liff.login();
          return;
        }

        const reason = document.querySelector('input[name="reason"]:checked').value;
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const request = document.getElementById("request").value.trim();

        if (!name || !phone || !request) {
          alert("請完整填寫姓名、電話與需求簡述");
          return;
        }

        const text =
`【華和資產客服表單】

諮詢事由：${reason}
姓名：${name}
電話：${phone}
需求簡述：
${request}`;

        await liff.sendMessages([
          {
            type: "text",
            text: text
          }
        ]);

        alert("表單已送出，請回到聊天室確認");

        if (liff.isInClient()) {
          liff.closeWindow();
        }

      } catch (error) {
        alert("送出失敗：\n\n" + error.message);
      }
    }

    main();
  </script>

</body>
</html>
